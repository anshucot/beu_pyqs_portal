<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Semesters</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2 id="branchTitle"></h2>

  <div class="container" id="semContainer"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const branch = params.get("branch");

    document.getElementById("branchTitle").innerText = branch.toUpperCase();

    const container = document.getElementById("semContainer");

    for (let i = 1; i <= 8; i++) {
      const link = document.createElement("a");
      link.href = `semester.html?branch=${branch}&sem=${i}`;
      link.className = "card";
      link.innerHTML = `<span>Semester ${i}</span>`;
      container.appendChild(link);
    }
  </script>

</body>
</html>
